<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나의 일정 & 달력 앱</title>
    <style>
        /* 모바일 최적화 심플 화이트/그레이 네추럴 테마 */
        :root {
            --primary: #4F46E5;
            --primary-light: #EEF2F6;
            --bg-main: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --border: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border);
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* 입력창 디자인 - 모바일 터치 영역 확보 */
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
            background: var(--bg-main);
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button.add-btn {
            padding: 0 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            min-height: 48px; /* 모바일 최소 터치 크기 */
        }

        /* 리스트 디자인 */
        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg-main);
            border-radius: 14px;
            border: 1px solid var(--border);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .todo-text {
            font-size: 1rem;
            flex: 1;
            margin-right: 12px;
            word-break: break-all;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .actions {
            display: flex;
            gap: 6px;
        }

        /* 모바일에서 누르기 편한 액션 버튼 */
        .action-btn {
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            min-height: 36px;
        }

        .complete-btn {
            background: #10B981;
            color: white;
        }

        .delete-btn {
            background: #EF4444;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="today-date">나의 일정 관리</h1>
        </header>

        <!-- 할 일 입력 구역 -->
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="오늘 할 일을 적어보세요..." autocomplete="off">
            <button class="add-btn" onclick="addTodo()">추가</button>
        </div>

        <!-- 할 일 출력 구역 -->
        <ul class="todo-list" id="todo-list">
            <!-- 자바스크립트로 아이템이 추가되는 공간 -->
        </ul>
    </div>

    <script>
        // 오늘 날짜 표시 기능
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('today-date').innerText = new Date().toLocaleDateString('ko-KR', options);

        // 로컬 스토리지에서 기존 할 일 불러오기
        let todos = JSON.parse(localStorage.getItem('my-todos')) || [];

        // 화면에 할 일 리스트를 그려주는 함수
        function renderTodos() {
            const listEl = document.getElementById('todo-list');
            listEl.innerHTML = '';

            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;

                li.innerHTML = `
                    <span class="todo-text" onclick="toggleTodo(${index})">${todo.text}</span>
                    <div class="actions">
                        <button class="action-btn complete-btn" onclick="toggleTodo(${index})">
                            ${todo.completed ? '해제' : '완료'}
                        </button>
                        <button class="action-btn delete-btn" onclick="deleteTodo(${index})">삭제</button>
                    </div>
                `;
                listEl.appendChild(li);
            });

            // 바뀐 데이터 저장
            localStorage.setItem('my-todos', JSON.stringify(todos));
        }

        // 새로운 할 일 추가 함수
        function addTodo() {
            const inputEl = document.getElementById('todo-input');
            const text = inputEl.value.trim();

            if (text === '') return;

            todos.push({ text: text, completed: false });
            inputEl.value = ''; // 입력창 비우기
            renderTodos();
        }

        // 엔터키 입력 처리 (모바일 키보드의 '이동/완료' 버튼 대응)
        document.getElementById('todo-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTodo();
            }
        });

        // 완료 상태 토글 함수
        function toggleTodo(index) {
            todos[index].completed = !todos[index].completed;
            renderTodos();
        }

        // 할 일 삭제 함수
        function deleteTodo(index) {
            todos.splice(index, 1);
            renderTodos();
        }

        // 앱 시작 시 최초 실행
        renderTodos();
    </script>
</body>
</html>
